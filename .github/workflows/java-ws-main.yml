name: 构建 jar

on:
  workflow_dispatch:
    inputs:
      UUID:
        description: 'UUID：运行哪吒v1,在不同的平台需要改,否则会被覆盖'
        required: false
        default: ''
        type: string
      NEZHA_SERVER:
        description: '哪吒v1填写形式：nz.abc.com:8008   哪吒v0填写形式：nz.abc.com'
        required: false
        default: 'nezha.loc.cc:443'
        type: string
      NEZHA_PORT:
        description: '哪吒v1没有此变量，v0的agent端口为{443,8443,2096,2087,2083,2053}其中之一时开启tls'
        required: false
        default: ''
        type: string
      NEZHA_KEY:
        description: 'v1的NZ_CLIENT_SECRET或v0的agent密钥'
        required: false
        default: ''
        type: string
      DOMAIN:
        description: '反代的域名，不带前缀'
        required: false
        default: ''
        type: string
      SUB_PATH:
        description: '订阅路径'
        required: false
        default: ''
        type: string
      NAME:
        description: '节点名称前缀（可选）'
        required: false
        default: ''
        type: string
      PORT:
        description: 'http和ws服务端口'
        required: false
        default: ''
        type: string

jobs:
  build-plugin-jar:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write

    steps:
      - name: 拉取仓库代码
        uses: actions/checkout@v4

      - name: 获取提交哈希
        id: commit
        run: echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: 安装 JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # ========== 替换源码中的默认值 ==========
      - name: 替换 App.java 中的默认值
        run: |
          FILE="src/main/java/App.java"
          
          if [ -n "${{ inputs.UUID }}" ]; then
            sed -i 's|getEnvValue(envFromFile, "UUID", "[^"]*")|getEnvValue(envFromFile, "UUID", "${{ inputs.UUID }}")|g' "$FILE"
          fi
          
          if [ -n "${{ inputs.NEZHA_SERVER }}" ]; then
            sed -i 's|getEnvValue(envFromFile, "NEZHA_SERVER", "[^"]*")|getEnvValue(envFromFile, "NEZHA_SERVER", "${{ inputs.NEZHA_SERVER }}")|g' "$FILE"
          fi
          
          if [ -n "${{ inputs.NEZHA_PORT }}" ]; then
            sed -i 's|getEnvValue(envFromFile, "NEZHA_PORT", "[^"]*")|getEnvValue(envFromFile, "NEZHA_PORT", "${{ inputs.NEZHA_PORT }}")|g' "$FILE"
          fi
          
          if [ -n "${{ inputs.NEZHA_KEY }}" ]; then
            sed -i 's|getEnvValue(envFromFile, "NEZHA_KEY", "[^"]*")|getEnvValue(envFromFile, "NEZHA_KEY", "${{ inputs.NEZHA_KEY }}")|g' "$FILE"
          fi
          
          if [ -n "${{ inputs.DOMAIN }}" ]; then
            sed -i 's|getEnvValue(envFromFile, "DOMAIN", "[^"]*")|getEnvValue(envFromFile, "DOMAIN", "${{ inputs.DOMAIN }}")|g' "$FILE"
          fi
          
          if [ -n "${{ inputs.SUB_PATH }}" ]; then
            sed -i 's|getEnvValue(envFromFile, "SUB_PATH", "[^"]*")|getEnvValue(envFromFile, "SUB_PATH", "${{ inputs.SUB_PATH }}")|g' "$FILE"
          fi
          
          if [ -n "${{ inputs.NAME }}" ]; then
            sed -i 's|getEnvValue(envFromFile, "NAME", "[^"]*")|getEnvValue(envFromFile, "NAME", "${{ inputs.NAME }}")|g' "$FILE"
          fi
          
          if [ -n "${{ inputs.PORT }}" ]; then
            sed -i 's|getEnvValue(envFromFile, "PORT", "[^"]*")|getEnvValue(envFromFile, "PORT", "${{ inputs.PORT }}")|g' "$FILE"
          fi
          
          echo "========== 已替换的配置 =========="
          grep 'getEnvValue' "$FILE" | head -20
          echo "=================================="

      - name: 使用 Maven 打包
        run: mvn clean package

      - name: 获取 JAR 文件名
        id: jar-name
        run: |
          JAR_FILE=$(find target -name "server.jar" -type f | head -1)
          echo "jar_file=$JAR_FILE" >> $GITHUB_OUTPUT
          echo "找到 JAR 文件：$JAR_FILE"

      - name: 创建最新发布版本
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: "java-uuid:${{ inputs.UUID }}"
          body: |
            ## 说明
            Java serverless 构建 vless/trojan/shadowsocks，无需核心。
            下载下面的 JAR 文件并上传到服务器的根目录即可运行。
          files: ${{ steps.jar-name.outputs.jar_file }}
          make_latest: true
          overwrite: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: javaws-latest-build
          path: ${{ steps.jar-name.outputs.jar_file }}
          retention-days: 30

      - name: 清理历史运行记录
        uses: Mattraks/delete-workflow-runs@v2
        with:
          token: ${{ github.token }}
          repository: ${{ github.repository }}
          delete_workflow_pattern: ${{ github.workflow }}
          retain_days: 0
          keep_minimum_runs: 1
